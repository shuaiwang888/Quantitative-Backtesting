name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 测试不需要真实 MySQL
          pip install pytest pytest-cov

      - name: Run tests
        env:
          # 公仓 PR（fork）拿不到 secrets，自动落到 dummy，避免硬编码真密钥。
          # 主仓 push / 维护者 PR 可在仓库 Settings → Secrets 配 IWENCAI_API_KEY；
          # 命中后 pytest 会跑需要真实 Iwencai SDK 的那条路径。
          IWENCAI_API_KEY: ${{ secrets.IWENCAI_API_KEY || 'test-key-for-ci' }}
          MYSQL_PERSIST_ENABLED: "0"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Compile check
        run: |
          python -m compileall -q quant/ app.py
