# 自动同步 GitHub main → Hugging Face Space 仓库
# HF Space 本身是 git 仓库：https://huggingface.co/spaces/<owner>/<space>
# 推送时只动我们关心的后端文件，避免误把 .github/、tests/、web/、docs/ 灌到 HF。
#
# 触发：push 到 main 且 quant/** / app.py / requirements.txt / Dockerfile 变化
# 所需 GitHub Secret：HF_TOKEN（write scope，限定到单个 Space）

name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - 'quant/**'
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/huggingface.yml'
  workflow_dispatch:

concurrency:
  group: huggingface
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 只拷贝后端需要的文件 + HF Space 友好的 README
      - name: Build filtered tree (server-only)
        run: |
          rm -rf hf-deploy
          mkdir hf-deploy
          cp -r quant/          hf-deploy/quant/
          cp app.py             hf-deploy/
          cp requirements.txt   hf-deploy/
          cp Dockerfile         hf-deploy/
          cp .dockerignore      hf-deploy/
          cat > hf-deploy/README.md <<'EOF'
          ---
          title: Quantitative Backtesting
          emoji: 📈
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          pinned: false
          license: mit
          ---

          # A股量化回测平台后端

          Docker SDK Space，监听 0.0.0.0:7860。

          前端（GitHub Pages）：https://shuaiwang888.github.io/Quantitative-Backtesting/
          （首次访问加 `?api=https://appQQQ-quantitative-backtesting-backend.hf.space` 切换后端）

          ## 端点

          - `GET  /api/strategies` — 列出所有策略
          - `POST /api/query`      — 单页问财
          - `POST /api/bars`       — 近一年日 K
          - `POST /api/backtest`   — 单标的回测
          - `POST /api/batch_backtest` — 批量回测
          - `POST /api/optimize`   — 网格寻优
          - `POST /api/analyze`    — AI 复盘
          EOF
          ls -la hf-deploy/

      - name: Verify HF Space reachable + token valid
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -x
          # 1) 打印 token 元信息（不打印 token 字符本身）
          if [[ -z "${HF_TOKEN}" ]]; then
            echo "❌ HF_TOKEN 未设置 —— 请到 GitHub repo Settings → Secrets 配 HF_TOKEN"
            exit 1
          fi
          echo "✅ HF_TOKEN 已配置（长度 ${#HF_TOKEN}，前缀 ${HF_TOKEN:0:3}...）"
          SPACE_URL="https://huggingface.co/spaces/appQQQ/Quantitative-Backtesting-backend"
          # 2) 先只读探活 Space 是否存在（认证 + ls-remote）
          echo "--- ls-remote HEAD（只读）---"
          git ls-remote "${SPACE_URL}" HEAD
          RC=$?
          set +x
          if [[ $RC -ne 0 ]]; then
            echo ""
            echo "❌ git ls-remote 失败 (exit $RC)。最常见原因："
            echo "   1. HF_TOKEN 失效 / scope 不足（需要 write on appQQQ/Quantitative-Backtesting-backend）"
            echo "   2. Space 仓库还不存在 —— 在 https://huggingface.co/spaces/appQQQ/Quantitative-Backtesting-backend 创建"
            echo "      Space SDK 选 'Docker'，硬件选 'CPU basic'（免费）"
            echo "   3. token 绑错了账号（绑到别的 HF 账号了）"
            exit $RC
          fi
          echo "✅ Space 可达 + 认证通过"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          cd hf-deploy
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b main || true
          git add -A
          # commit.gpgsign=false 避免 Action runner 缺 GPG key 报错
          git -c commit.gpgsign=false commit -qm "sync from shuaiwang888/Quantitative-Backtesting@${{ github.sha }}"
          # -f 是因为我们用一个空仓库覆盖 HF 端（首次部署时 repo 已有 README）
          SPACE_URL="https://appQQQ:${HF_TOKEN}@huggingface.co/spaces/appQQQ/Quantitative-Backtesting-backend"
          echo "--- git push（带详细进度）---"
          GIT_TRACE=1 GIT_CURL_VERBOSE=1 git push -f "$SPACE_URL" main 2>&1 | tail -30
          echo "✅ push 完成"
