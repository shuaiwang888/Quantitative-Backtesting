# 自动同步 GitHub main → Hugging Face Space 仓库
# 用 HF 官方 Python SDK（huggingface_hub）替代 raw git push：
#   - 不依赖 git over HTTPS（HF 端 git LFS 偶发 5xx）
#   - 详细错误（"token 失效" / "scope 不足" / "Space 不存在"）
#   - 一步完成"上传 + 触发 build"
#
# 触发：push 到 main 且 quant/** / app.py / requirements.txt / Dockerfile 变化
# 所需 GitHub Secret：HF_TOKEN（write scope，限定到 appQQQ/Quantitative-Backtesting-backend）

name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - 'quant/**'
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/huggingface.yml'
  workflow_dispatch:

concurrency:
  group: huggingface
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 装 HF 官方 Python SDK
      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.20"

      # 只拷贝后端需要的文件 + HF Space 友好的 README（带 YAML frontmatter 标记 SDK = docker）
      - name: Build filtered tree (server-only)
        run: |
          rm -rf hf-deploy
          mkdir hf-deploy
          cp -r quant/          hf-deploy/quant/
          cp app.py             hf-deploy/
          cp requirements.txt   hf-deploy/
          cp Dockerfile         hf-deploy/
          cp .dockerignore      hf-deploy/
          cat > hf-deploy/README.md <<'EOF'
          ---
          title: Quantitative Backtesting
          emoji: 📈
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          app_file: app.py
          pinned: false
          license: mit
          short_description: A股量化回测平台后端（Python stdlib http.server）
          ---

          # A股量化回测平台后端

          Docker SDK Space，监听 0.0.0.0:7860。

          前端（GitHub Pages）：https://shuaiwang888.github.io/Quantitative-Backtesting/
          （首次访问加 `?api=https://appQQQ-quantitative-backtesting-backend.hf.space` 切换后端）

          ## 端点

          - `GET  /api/strategies` — 列出所有策略
          - `POST /api/query`      — 单页问财
          - `POST /api/bars`       — 近一年日 K
          - `POST /api/backtest`   — 单标的回测
          - `POST /api/batch_backtest` — 批量回测
          - `POST /api/optimize`   — 网格寻优
          - `POST /api/analyze`    — AI 复盘

          ## 配置

          Space Settings → Variables and secrets：
          - `CORS_ORIGIN` = `https://shuaiwang888.github.io`
          - `IWENCAI_API_KEY`（secret）= owner 的问财 key
          - `MINIMAX_API_KEY`（secret）= owner 的 M2.7 key
          - `PORT` = `7860`
          - `MYSQL_PERSIST_ENABLED` = `0`
          EOF
          echo "--- hf-deploy 内容 ---"
          find hf-deploy -maxdepth 2 -type f | sort

      # 验证 token：whoami 告诉我们绑到哪个账号 + 是否有 write 权限
      - name: Verify HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, sys
          from huggingface_hub import HfApi
          token = os.environ.get("HF_TOKEN", "")
          if not token:
              print("❌ HF_TOKEN 未配置 — 去 GitHub repo Settings → Secrets 配")
              sys.exit(1)
          print(f"✅ HF_TOKEN 已配置（长度 {len(token)}，前缀 {token[:3]}...）")
          api = HfApi(token=token)
          me = api.whoami()
          me_name = me.get('name')
          me_type = me.get('type')
          print(f"   绑到账号: {me_name}  (type={me_type})")
          # 关键检查：token 绑的账号必须 == Space owner
          expected_owner = "appQQQ"
          if me_name != expected_owner:
              print(f"   ❌ token 绑到 '{me_name}'，但 Space owner 是 '{expected_owner}'")
              print(f"      修复：用 {expected_owner} 账号登录 https://huggingface.co/settings/tokens 重新生成 token")
              sys.exit(1)
          print(f"   ✅ token 绑到正确账号 ({expected_owner})")
          # 检查 Space 当前状态（不触发 build）
          try:
              # huggingface_hub 0.20+ 用 repo_info(repo_type="space")，
              # 旧版 0.19 用 get_repo_info
              try:
                  info = api.repo_info("appQQQ/Quantitative-Backtesting-backend", repo_type="space")
              except AttributeError:
                  info = api.get_repo_info("appQQQ/Quantitative-Backtesting-backend", repo_type="space")
              # SpaceInfo 属性：id, sdk, runtime (SpaceRuntime), space_runtime (alias), ...
              # runtime 是 SpaceRuntime 对象，有 stage / hardware / requested_hardware
              runtime = getattr(info, "runtime", None) or getattr(info, "space_runtime", None)
              runtime_stage = getattr(runtime, "stage", "?") if runtime else "?"
              runtime_hw = getattr(runtime, "hardware", "?") if runtime else "?"
              print(f"   Space 状态: sdk={info.sdk}  status={runtime_stage}  hardware={runtime_hw}")
          except Exception as e:
              print(f"   ❌ 读不到 Space 信息: {type(e).__name__}: {e}")
              print(f"   可能原因：Space 不存在 / 拼写错 / token 没权限读这个 repo")
              sys.exit(1)
          PY

      # 用 SDK 上传（一步覆盖）
      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, sys
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "appQQQ/Quantitative-Backtesting-backend"
          print(f"--- upload_folder {repo_id} ---")
          try:
              # commit_message 留个 trace，方便排查
              url = api.upload_folder(
                  folder_path="hf-deploy",
                  repo_id=repo_id,
                  repo_type="space",
                  commit_message="sync from shuaiwang888/Quantitative-Backtesting@${{ github.sha }}",
              )
              print(f"✅ 上传成功: {url}")
          except Exception as e:
              print(f"❌ upload_folder 失败: {type(e).__name__}: {e}")
              # 常见原因：
              #   - 401 Token: token 无效或失效 → 重新生成
              #   - 403 Forbidden: token 没有 write scope，或绑到错账号
              #   - 404 Not Found: Space 不存在或路径拼错
              print("   ↑ 上面的异常类型+消息就是根因，照着改 HF_TOKEN 或 Space 路径")
              sys.exit(1)
          PY

      # 触发 build（upload_folder 在 Space 第一次创建时通常会自动触发 build，
      # 但已有 Space 改文件可能不会，所以显式 restart）
      - name: Trigger HF Space rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "appQQQ/Quantitative-Backtesting-backend"
          print(f"--- restart_space {repo_id} ---")
          try:
              api.restart_space(repo_id=repo_id)
              print("✅ restart API 已调用，HF 平台将异步启动 build（1-3 min）")
          except Exception as e:
              print(f"⚠️ restart_space 失败（不阻塞 push，build 可能自动触发）: {type(e).__name__}: {e}")
          PY
