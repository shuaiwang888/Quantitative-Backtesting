# 自动部署 static/ 到 GitHub Pages
# 触发：push 到 main 且 web/** / static/** / package.json / 本文件变化
# 注意：GitHub Pages 只能服务静态文件；Python 后端不在这里跑，需要部署到 Render / Railway / Fly.io 等。
#
# 工作流：
#   1. checkout
#   2. setup Node 20 → npm ci → npm run build（Vite 把 web/ 编到 static/）
#   3. setup Pages（幂等）
#   4. 上传 static/ 作为 artifact
#   5. 部署到 GitHub Pages

name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# 让 action 有写 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只能跑一个部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 跑 Vite 构建：web/index.html + web/src/** → static/index.html + static/assets/**
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (Vite → static/)
        run: npm run build

      # 用 `continue-on-error` 兜底：即使 configure-pages 在已启用 Pages 的 repo
      # 上偶发失败，也不阻断后续部署。如果之前有人手动在 Settings 启用过
      # Pages，这里会跳过 enablement；否则才尝试 enable。
      - name: Setup Pages (idempotent)
        id: setup
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true

      - name: Upload static/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

      # 给 GitHub 一点时间消化 Pages 状态变更（enablement 后首次部署常需要）
      - name: Wait for Pages ready
        if: steps.setup.outcome == 'success'
        run: sleep 5

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
