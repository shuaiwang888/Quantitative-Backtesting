# 自动部署 static/ 到 GitHub Pages
# 触发：push 到 main 且 static/** 或本文件变化
# 注意：GitHub Pages 只能服务静态文件；Python 后端不在这里跑，需要部署到 Render / Railway / Fly.io 等。

name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'static/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# 让 action 有写 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只能跑一个部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true 让 action 自动启用 Pages（首次部署友好）。
      # 如果已经启用，这个参数是 no-op；不会破坏现有 Pages 配置。
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4