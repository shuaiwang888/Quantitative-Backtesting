<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#4ea8ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="none" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 网格横线（淡化） -->
  <line x1="10" y1="22" x2="54" y2="22" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6"/>
  <line x1="10" y1="34" x2="54" y2="34" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6"/>
  <line x1="10" y1="46" x2="54" y2="46" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6"/>

  <!-- 4 根 K 线 -->
  <!-- 绿 K1（涨） -->
  <line x1="16" y1="44" x2="16" y2="38" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="13" y="40" width="6" height="6" fill="#10b981" rx="0.5"/>

  <!-- 红 K2（跌） -->
  <line x1="26" y1="36" x2="26" y2="46" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="23" y="36" width="6" height="6" fill="none" stroke="#ef4444" stroke-width="1.4" rx="0.5"/>

  <!-- 红 K3（跌） -->
  <line x1="36" y1="30" x2="36" y2="42" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="33" y="32" width="6" height="6" fill="none" stroke="#ef4444" stroke-width="1.4" rx="0.5"/>

  <!-- 绿 K4（涨） -->
  <line x1="46" y1="26" x2="46" y2="18" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="43" y="22" width="6" height="6" fill="#10b981" rx="0.5"/>

  <!-- 上升趋势线 -->
  <polyline points="14,46 24,40 34,34 44,22 52,16"
            fill="none" stroke="url(#trend)" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glow)" opacity="0.95"/>

  <!-- 端点高亮 -->
  <circle cx="52" cy="16" r="2.2" fill="#4ea8ff"/>
  <circle cx="52" cy="16" r="1.2" fill="#ffffff"/>
</svg>
